<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin</title>
    <link rel="stylesheet" href="css/admin_styles.css">
</head>
<body>
    <div class="container">
     <div class="login">
        <h1>Admin</h1>
        <form action="/admin" method="post">
            <table>
                <tr>
                    <td><input type="text" class="input" name="username" placeholder="Username" style="margin-top: 40px;" required></td>
                </tr>
                <tr>
                    <td><input type="password" class="input" name="password" placeholder="Password" required></td>
                </tr>
                <tr>
                    <td colspan="2"><button id="login-button" type="submit">Login</button></td>
                </tr>
             </table>
            </table>
        </form>
    </div>
    </div>
</body>
</html>
